<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu App de Viagens</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <!-- CABEÇALHO -->
        <header class="main-header">
            <div class="title-container">
                <div id="main-title" class="title">Minhas Viagens</div>
                <div id="trip-context" class="trip-context" style="display: none;"></div>
            </div>
            <div id="add-trip-button" class="icon add-icon">+</div>
        </header>

        <!-- CONTEÚDO PRINCIPAL -->
        <main>
            <div id="trips-tab" class="tab-content active">
                <div id="trip-grid" class="trip-grid"></div>
                <p id="no-trips-message" style="display: none;">Nenhuma viagem cadastrada. Clique no '+' para começar.</p>
            </div>
            <div id="ai-planner-tab" class="tab-content"></div>
            <div id="flights-tab" class="tab-content"></div>
            <div id="accommodation-tab" class="tab-content"></div>
            <div id="itinerary-tab" class="tab-content"></div>
            <div id="packing-tab" class="tab-content"></div>
            <div id="expenses-tab" class="tab-content"></div>
            <div id="documents-tab" class="tab-content"></div>
            <div id="tripDashboard-tab" class="tab-content"></div>
        </main>

        <!-- NAVEGAÇÃO INFERIOR -->
        <nav class="bottom-nav">
            <ul class="nav-list">
                <li class="nav-item active" data-tab="trips">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
                </li>
                 <li class="nav-item disabled" data-tab="ai-planner">
                    <svg class="icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9.5 2.122a3 3 0 0 1 5 0"/><path d="M9.512 4.455A3 3 0 0 0 12 5.5a3 3 0 0 0 2.488-1.045"/><path d="M12 5.5V12"/><path d="M12 12a6 6 0 1 0 6 6"/><path d="M12 12a6 6 0 1 1-6 6"/><path d="M12 12a6 6 0 1 0-6-6"/><path d="M12 12a6 6 0 1 1 6-6"/></svg>
                </li>
                <li class="nav-item disabled" data-tab="flights">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 12h17l-4 -4m4 4l-4 4"></path><path d="M19 5h-14a2 2 0 0 0 -2 2v10a2 2 0 0 0 2 2h14a2 2 0 0 0 2 -2v-10a2 2 0 0 0 -2 -2z"></path></svg>
                </li>
                <li class="nav-item disabled" data-tab="accommodation">
                     <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 21v-13a3 3 0 0 1 3 -3h10a3 3 0 0 1 3 3v13"></path><path d="M9 21v-4a1 1 0 0 1 1 -1h4a1 1 0 0 1 1 1v4"></path><line x1="10" y1="9" x2="10" y2="9.01"></line><line x1="14" y1="9" x2="14" y2="9.01"></line><line x1="10" y1="12" x2="10" y2="12.01"></line><line x1="14" y1="12" x2="14" y2="12.01"></line></svg>
                </li>
                <li class="nav-item disabled" data-tab="itinerary">
                     <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5h-2a2 2 0 0 0 -2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2 -2v-12a2 2 0 0 0 -2 -2h-2"></path><rect x="9" y="3" width="6" height="4" rx="2"></rect><path d="M9 12h6"></path><path d="M9 16h6"></path></svg>
                </li>
                <li class="nav-item disabled" data-tab="packing">
                     <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="3" width="14" height="18" rx="2"></rect><line x1="9" y1="7" x2="15" y2="7"></line><line x1="9" y1="11" x2="15" y2="11"></line><line x1="9" y1="15" x2="13" y2="15"></line></svg>
                </li>
                <li class="nav-item disabled" data-tab="expenses">
                     <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 8v-3a1 1 0 0 0 -1 -1h-10a2 2 0 0 0 0 4h12a1 1 0 0 1 1 1v3m0 4v3a1 1 0 0 1 -1 1h-12a2 2 0 0 1 -2 -2v-12"></path><line x1="20" y1="12" x2="20" y2="12.01"></line></svg>
                </li>
                <li class="nav-item disabled" data-tab="tripDashboard">
                     <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg>
                </li>
            </ul>
        </nav>
    </div>

    <!-- MODAL PARA ADICIONAR VIAGEM -->
    <div id="add-trip-modal" class="modal-overlay">
        <div class="modal-content">
            <button id="close-add-trip-modal" class="modal-close-button">&times;</button>
            <h2>Adicionar Nova Viagem</h2>
            <form id="add-trip-form">
                <div class="form-card">
                    <label for="trip-name-input">Nome da Viagem</label>
                    <input type="text" id="trip-name-input" placeholder="Ex: Férias na Praia" required>
                    <label for="trip-destination-input">Destino</label>
                    <input type="text" id="trip-destination-input" placeholder="Ex: Brasil" required>
                    <button type="submit">Criar Viagem</button>
                </div>
            </form>
        </div>
    </div>

    <!-- MODAL PARA DETALHES DO DIA -->
    <div id="day-detail-modal" class="modal-overlay">
        <div class="modal-content">
            <button class="modal-close-button">&times;</button>
            <h2 id="modal-day-title"></h2>
            <div class="item-list"><ul id="modal-day-events"></ul></div>
        </div>
    </div>

    <!-- TEMPLATES -->
    <template id="trip-card-template">
        <div class="trip-card">
            <div class="card-header"><span class="country-name"></span></div>
            <img src="" alt="Imagem do local" class="card-image">
            <button class="manage-button">GERENCIAR</button>
        </div>
    </template>
    <template id="ai-planner-tab-template">
        <div>
            <h3>Assistente de Planeamento IA</h3>
            <div class="form-card">
                <form id="ai-planner-form">
                    <label for="duration">Quantos dias dura a viagem?</label>
                    <input type="number" id="duration" name="duration" placeholder="Ex: 7" required>
                    
                    <label for="style">Qual o seu estilo de viagem?</label>
                    <select id="style" name="style">
                        <option value="economico">Económico</option>
                        <option value="equilibrado">Equilibrado</option>
                        <option value="luxo">Luxo</option>
                        <option value="aventura">Aventura</option>
                    </select>

                    <label for="interests">Quais são os seus principais interesses?</label>
                    <input type="text" id="interests" name="interests" placeholder="Ex: Museus, gastronomia, caminhadas" required>

                    <label for="extra-info">Informações adicionais:</label>
                    <textarea id="extra-info" name="extraInfo" placeholder="Ex: Viajo com crianças, prefiro evitar multidões..."></textarea>
                    
                    <button type="submit" class="ai-button">Gerar Plano de Viagem com IA</button>
                    <div class="loading-indicator">A gerar o seu plano...</div>
                </form>
            </div>
        </div>
    </template>
    <template id="flights-tab-template">
        <div>
            <h3>Gerenciamento de Voos</h3>
            <div class="form-card">
                <form class="add-item-form" data-type="flights">
                    <input type="text" name="company" placeholder="Companhia Aérea" required>
                    <input type="text" name="number" placeholder="Número do Voo" required>
                    <button type="submit">Adicionar Voo</button>
                </form>
                <button class="google-flights-button">Pesquisar Voos no Google</button>
            </div>
            <div class="item-list"><ul class="list-container"></ul></div>
        </div>
    </template>
    <template id="accommodation-tab-template">
        <div>
            <h3>Gerenciamento de Hospedagem</h3>
            <div class="form-card">
                <form class="add-item-form" data-type="accommodations">
                    <input type="text" name="name" placeholder="Nome do Hotel/Airbnb" required>
                    <input type="text" name="address" placeholder="Endereço" required>
                    <button type="submit">Adicionar Hospedagem</button>
                </form>
                 <button class="google-hotels-button">Pesquisar Hotéis no Google</button>
            </div>
            <div class="item-list"><ul class="list-container"></ul></div>
        </div>
    </template>
    <template id="itinerary-tab-template">
        <div>
            <h3>Itinerário Diário</h3>
            <div class="itinerary-calendar">
                <!-- Os cartões dos dias serão inseridos aqui -->
            </div>
        </div>
    </template>
    <template id="packing-tab-template">
        <div>
            <h3>Lista de Empacotamento</h3>
            <div class="form-card">
                <form class="add-item-form" data-type="packing">
                    <input type="text" name="item" placeholder="Ex: Casaco" required>
                    <button type="submit">Adicionar Item</button>
                </form>
            </div>
            <div class="item-list"><ul class="list-container"></ul></div>
        </div>
    </template>
    <template id="expenses-tab-template">
        <div>
            <h3>Controle de Gastos</h3>
            <div class="form-card">
                <form class="add-item-form" data-type="expenses">
                    <input type="text" name="description" placeholder="Ex: Almoço" required>
                    <input type="number" name="amount" placeholder="Valor" step="0.01" required>
                    <button type="submit">Adicionar Gasto</button>
                </form>
            </div>
            <div class="item-list"><ul class="list-container"></ul></div>
        </div>
    </template>
    <template id="documents-tab-template"><div><h3>Documentos - Em construção</h3></div></template>
    <template id="tripDashboard-tab-template"><div><h3>Dashboard da Viagem - Em construção</h3></div></template>
    
    <!-- Link para o seu ficheiro de script -->
    <script type="module" src="/script.js"></script>
</body>
</html>
