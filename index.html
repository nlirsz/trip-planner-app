<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu App de Viagens</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- TELA DE LOGIN -->
    <div id="auth-container" class="active">
        <div class="auth-form-container">
            <div id="login-form-container">
                <h2>Login</h2>
                <form id="login-form">
                    <input type="email" id="login-email" placeholder="Email" required>
                    <input type="password" id="login-password" placeholder="Senha" required>
                    <button type="submit">Entrar</button>
                    <p>Não tem uma conta? <a href="#" id="show-signup">Cadastre-se</a></p>
                </form>
            </div>
            <div id="signup-form-container" style="display: none;">
                <h2>Cadastro</h2>
                <form id="signup-form">
                    <input type="email" id="signup-email" placeholder="Email" required>
                    <input type="password" id="signup-password" placeholder="Senha (mínimo 6 caracteres)" required>
                    <button type="submit">Cadastrar</button>
                    <p>Já tem uma conta? <a href="#" id="show-login">Faça o login</a></p>
                </form>
            </div>
        </div>
    </div>

    <div class="app-container">
        <!-- CABEÇALHO -->
        <header class="main-header">
            <div class="title-container">
                <div id="main-title" class="title">Minhas Viagens</div>
                <div id="trip-context" class="trip-context" style="display: none;"></div>
            </div>
            <div id="add-trip-button" class="icon add-icon">+</div>
        </header>

        <!-- CONTEÚDO PRINCIPAL -->
        <main>
            <div id="trips-tab" class="tab-content active">
                <div id="trip-grid" class="trip-grid"></div>
                <p id="no-trips-message" style="display: none;">Nenhuma viagem cadastrada. Clique no '+' para começar.</p>
            </div>
            <div id="ai-planner-tab" class="tab-content"></div>
            <div id="flights-tab" class="tab-content"></div>
            <div id="accommodation-tab" class="tab-content"></div>
            <div id="itinerary-tab" class="tab-content"></div>
            <div id="packing-tab" class="tab-content"></div>
            <div id="expenses-tab" class="tab-content"></div>
            <div id="documents-tab" class="tab-content"></div>
            <div id="tripDashboard-tab" class="tab-content"></div>
        </main>

        <!-- NAVEGAÇÃO INFERIOR -->
        <nav class="bottom-nav">
            <ul class="nav-list">
                <li class="nav-item active" data-tab="trips">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
                </li>
                 <li class="nav-item disabled" data-tab="ai-planner">
                    <svg class="icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9.5 2.122a3 3 0 0 1 5 0"/><path d="M9.512 4.455A3 3 0 0 0 12 5.5a3 3 0 0 0 2.488-1.045"/><path d="M12 5.5V12"/><path d="M12 12a6 6 0 1 0 6 6"/><path d="M12 12a6 6 0 1 1-6 6"/><path d="M12 12a6 6 0 1 0-6-6"/><path d="M12 12a6 6 0 1 1 6-6"/></svg>
                </li>
                <li class="nav-item disabled" data-tab="flights">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 12h17l-4 -4m4 4l-4 4"></path><path d="M19 5h-14a2 2 0 0 0 -2 2v10a2 2 0 0 0 2 2h14a2 2 0 0 0 2 -2v-10a2 2 0 0 0 -2 -2z"></path></svg>
                </li>
                <li class="nav-item disabled" data-tab="accommodation">
                     <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 21v-13a3 3 0 0 1 3 -3h10a3 3 0 0 1 3 3v13"></path><path d="M9 21v-4a1 1 0 0 1 1 -1h4a1 1 0 0 1 1 1v4"></path><line x1="10" y1="9" x2="10" y2="9.01"></line><line x1="14" y1="9" x2="14" y2="9.01"></line><line x1="10" y1="12" x2="10" y2="12.01"></line><line x1="14" y1="12" x2="14" y2="12.01"></line></svg>
                </li>
                <li class="nav-item disabled" data-tab="itinerary">
                     <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5h-2a2 2 0 0 0 -2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2 -2v-12a2 2 0 0 0 -2 -2h-2"></path><rect x="9" y="3" width="6" height="4" rx="2"></rect><path d="M9 12h6"></path><path d="M9 16h6"></path></svg>
                </li>
                <li class="nav-item disabled" data-tab="packing">
                     <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="3" width="14" height="18" rx="2"></rect><line x1="9" y1="7" x2="15" y2="7"></line><line x1="9" y1="11" x2="15" y2="11"></line><line x1="9" y1="15" x2="13" y2="15"></line></svg>
                </li>
                <li class="nav-item disabled" data-tab="expenses">
                     <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 8v-3a1 1 0 0 0 -1 -1h-10a2 2 0 0 0 0 4h12a1 1 0 0 1 1 1v3m0 4v3a1 1 0 0 1 -1 1h-12a2 2 0 0 1 -2 -2v-12"></path><line x1="20" y1="12" x2="20" y2="12.01"></line></svg>
                </li>
                <li class="nav-item disabled" data-tab="tripDashboard">
                     <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg>
                </li>
            </ul>
        </nav>
    </div>

    <!-- MODAL PARA ADICIONAR VIAGEM -->
    <div id="add-trip-modal" class="modal-overlay">
        <div class="modal-content">
            <button id="close-add-trip-modal" class="modal-close-button">&times;</button>
            <h2>Adicionar Nova Viagem</h2>
            <form id="add-trip-form">
                <div class="form-card">
                    <label for="trip-name-input">Nome da Viagem</label>
                    <input type="text" id="trip-name-input" placeholder="Ex: Férias na Praia" required>
                    <label for="trip-destination-input">Destino</label>
                    <input type="text" id="trip-destination-input" placeholder="Ex: Grécia" required>
                    <div class="date-inputs">
                        <div>
                            <label for="trip-start-date-input">Data de Início</label>
                            <input type="date" id="trip-start-date-input" required>
                        </div>
                        <div>
                            <label for="trip-end-date-input">Data de Fim</label>
                            <input type="date" id="trip-end-date-input" required>
                        </div>
                    </div>
                    <button type="submit">Criar Viagem</button>
                </div>
            </form>
        </div>
    </div>

    <!-- MODAL PARA DETALHES DO DIA -->
    <div id="day-detail-modal" class="modal-overlay">
        <div class="modal-content">
            <button class="modal-close-button">&times;</button>
            <form id="day-detail-form">
                <input type="text" id="modal-day-title-input" class="modal-title-input" readonly>
                <div id="modal-day-events-container" class="item-list">
                    <!-- Eventos do dia serão inseridos aqui -->
                </div>
                <div class="modal-actions">
                    <button type="button" id="edit-day-button">Editar</button>
                    <button type="submit" id="save-day-button" style="display: none;">Salvar</button>
                </div>
            </form>
        </div>
    </div>

    <!-- TEMPLATES -->
    <template id="event-item-template">
        <div class="event-item">
            <input type="time" class="event-time-input" readonly>
            <input type="text" class="event-description-input" readonly>
            <button type="button" class="remove-event-button" style="display: none;">&times;</button>
        </div>
    </template>
    <template id="trip-card-template">
        <div class="trip-card">
            <div class="card-header"><span class="country-name"></span></div>
            <img src="" alt="Imagem do local" class="card-image">
            <button class="manage-button">GERENCIAR</button>
        </div>
    </template>
    <template id="ai-planner-tab-template">
        <div>
            <h3>Assistente de Planeamento IA</h3>
            <p>Forneça o máximo de detalhes possível para um roteiro hiperpersonalizado.</p>
            <div class="form-card">
                <form id="ai-planner-form">
                    <div class="form-section">
                        <h4>Perfil da Viagem</h4>
                        <label for="ai-travel-company">Vai viajar com quem?</label>
                        <select id="ai-travel-company" name="travelCompany">
                            <option value="sozinho">Sozinho(a)</option>
                            <option value="casal">Em casal</option>
                            <option value="amigos">Com amigos</option>
                            <option value="familia">Em família</option>
                        </select>
                        <label for="ai-travel-style">Qual é o seu estilo de viagem?</label>
                        <input type="text" id="ai-travel-style" name="travelStyle" placeholder="Ex: Gastronômico, cultural, aventura, relax" required>
                        <label for="ai-daily-budget">Orçamento médio por dia (sem contar hospedagem)</label>
                        <input type="number" id="ai-daily-budget" name="dailyBudget" placeholder="Ex: 150" required>
                    </div>

                    <div class="form-section">
                        <h4>Interesses e Atividades</h4>
                        <label for="ai-interests">Quais são seus principais interesses?</label>
                        <textarea id="ai-interests" name="interests" rows="3" placeholder="Ex: Museus de arte moderna, fotografia, vinhos, história da Segunda Guerra, trilhas na natureza..."></textarea>
                        <label for="ai-must-do">Tem alguma experiência ou atividade que faz questão de incluir?</label>
                        <textarea id="ai-must-do" name="mustDo" rows="2" placeholder="Ex: Ir a um jogo de futebol, fazer um curso de culinária, visitar a Oktoberfest..."></textarea>
                        <label for="ai-restrictions">Tem alguma restrição ou algo que NÃO gosta de fazer?</label>
                        <textarea id="ai-restrictions" name="restrictions" rows="2" placeholder="Ex: Odeio museus parados, não como frutos do mar, não gosto de acordar cedo..."></textarea>
                    </div>

                    <div class="form-section">
                        <h4>Logística e Ritmo</h4>
                        <label for="ai-pace">Qual ritmo de viagem prefere?</label>
                        <select id="ai-pace" name="pace">
                            <option value="acordar_cedo">Acordar cedo e aproveitar o dia</option>
                            <option value="comecar_tarde">Começar os passeios mais tarde (depois das 10h)</option>
                            <option value="flexivel">Flexível</option>
                        </select>
                        <label for="ai-transport">Como pretende se locomover?</label>
                        <select id="ai-transport" name="transport">
                            <option value="transporte_publico">Principalmente transporte público</option>
                            <option value="alugar_carro">Alugar um carro</option>
                            <option value="misto">Misto (carro para passeios, público na cidade)</option>
                        </select>
                         <label for="ai-rest-time">Deseja que o roteiro inclua tempo para descanso?</label>
                        <input type="checkbox" id="ai-rest-time" name="restTime" checked>
                    </div>
                    
                    <div class="form-section">
                        <h4>Sugestões e Detalhes</h4>
                        <label for="ai-schedule-detail">Nível de detalhe do cronograma:</label>
                        <select id="ai-schedule-detail" name="scheduleDetail">
                            <option value="hora_a_hora">Planejado hora a hora</option>
                            <option value="blocos">Apenas blocos (manhã, tarde, noite)</option>
                        </select>
                        <label for="ai-extra-suggestions">Deseja sugestões extras?</label>
                        <div class="checkbox-group">
                            <input type="checkbox" id="ai-restaurants" name="suggestRestaurants" checked> <label for="ai-restaurants">Restaurantes</label>
                            <input type="checkbox" id="ai-hotels" name="suggestHotels" checked> <label for="ai-hotels">Bairros para Hospedagem</label>
                            <input type="checkbox" id="ai-nightlife" name="suggestNightlife"> <label for="ai-nightlife">Bares e Vida Noturna</label>
                            <input type="checkbox" id="ai-shopping" name="suggestShopping"> <label for="ai-shopping">Compras</label>
                        </div>
                    </div>

                    <button type="submit" class="ai-button">Gerar Roteiro Hiperpersonalizado</button>
                    <div class="loading-indicator">A gerar o seu plano...</div>
                </form>
            </div>
            <div id="download-links-container"></div>
        </div>
    </template>
    <template id="flights-tab-template">
        <div>
            <h3>Gerenciamento de Voos</h3>
            <div class="form-card">
                <form class="add-item-form" data-type="flights">
                    <input type="text" name="company" placeholder="Companhia Aérea" required>
                    <input type="text" name="number" placeholder="Número do Voo" required>
                    <button type="submit">Adicionar Voo</button>
                </form>
                <button class="google-flights-button">Pesquisar Voos no Google</button>
            </div>
            <div class="item-list"><ul class="list-container"></ul></div>
        </div>
    </template>
    <template id="accommodation-tab-template">
        <div>
            <h3>Gerenciamento de Hospedagem</h3>
            <div class="form-card">
                <form class="add-item-form" data-type="accommodations">
                    <input type="text" name="name" placeholder="Nome do Hotel/Airbnb" required>
                    <input type="text" name="address" placeholder="Endereço" required>
                    <button type="submit">Adicionar Hospedagem</button>
                </form>
                 <button class="google-hotels-button">Pesquisar Hotéis no Google</button>
            </div>
            <div class="item-list"><ul class="list-container"></ul></div>
        </div>
    </template>
    <template id="itinerary-tab-template">
        <div>
            <div class="itinerary-header">
                <h3>Itinerário Diário</h3>
                <button id="chat-with-ai-button" class="ai-button">Conversar com IA para Refinar</button>
            </div>
            <div id="itinerary-table-container">
                <!-- A tabela do itinerário será inserida aqui -->
            </div>
        </div>
    </template>

    <!-- MODAL DE CHAT COM A IA -->
    <div id="ai-chat-modal" class="modal-overlay">
        <div class="modal-content">
            <button id="close-ai-chat-modal" class="modal-close-button">&times;</button>
            <h2>Refinar Roteiro com IA</h2>
            <div id="ai-chat-messages" class="chat-messages"></div>
            <form id="ai-chat-form" class="chat-form">
                <input type="text" id="ai-chat-input" placeholder="Digite sua solicitação (ex: 'Adicione um dia de descanso na quarta-feira')" required>
                <button type="submit">Enviar</button>
            </form>
            <div class="loading-indicator">A IA está a pensar...</div>
        </div>
    </div>
    <template id="packing-tab-template">
        <div>
            <h3>Lista de Empacotamento</h3>
            <div class="form-card">
                <form class="add-item-form" data-type="packing">
                    <input type="text" name="item" placeholder="Ex: Casaco" required>
                    <button type="submit">Adicionar Item</button>
                </form>
            </div>
            <div class="item-list"><ul class="list-container"></ul></div>
        </div>
    </template>
    <template id="expenses-tab-template">
        <div>
            <h3>Controle de Gastos</h3>
            <div class="form-card">
                <form class="add-item-form" data-type="expenses">
                    <input type="text" name="description" placeholder="Ex: Almoço" required>
                    <input type="number" name="amount" placeholder="Valor" step="0.01" required>
                    <button type="submit">Adicionar Gasto</button>
                </form>
            </div>
            <div class="item-list"><ul class="list-container"></ul></div>
        </div>
    </template>
    <template id="documents-tab-template"><div><h3>Documentos - Em construção</h3></div></template>
    <template id="tripDashboard-tab-template"><div><h3>Dashboard da Viagem - Em construção</h3></div></template>
    
    <!-- Link para o seu ficheiro de script -->
    <script type="module" src="./script.js"></script>
</body>
</html>
